<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHAO HAO | 作品集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0b0b14;
            --card: rgba(22, 22, 40, 0.6);
            --border: rgba(108, 140, 255, 0.1);
            --accent: #6c8cff;
            --accent2: #a78bfa;
            --pink: #f472b6;
            --text: #e8e8f0;
            --muted: #8888aa;
            --radius: 16px;
        }
        body {
            font-family: -apple-system, 'Helvetica Neue', 'Noto Sans SC', 'Noto Sans JP', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* ========== Animated BG ========== */
        .bg-glow {
            position: fixed; top: -50%; left: -30%;
            width: 160%; height: 160%;
            z-index: 0; pointer-events: none;
            overflow: hidden;
        }
        .bg-glow .orb {
            position: absolute; border-radius: 50%;
            filter: blur(120px); opacity: 0.1;
            animation: orbFloat 20s ease-in-out infinite alternate;
        }
        .bg-glow .orb:nth-child(1) { width: 700px; height: 700px; background: #6c8cff; top: 5%; left: 0; animation-duration: 22s; }
        .bg-glow .orb:nth-child(2) { width: 550px; height: 550px; background: #a78bfa; bottom: 0; right: 0; animation-duration: 18s; animation-delay: -7s; }
        .bg-glow .orb:nth-child(3) { width: 400px; height: 400px; background: #f472b6; top: 40%; left: 45%; animation-duration: 24s; animation-delay: -14s; opacity: 0.06; }
        @keyframes orbFloat {
            0% { transform: translate(0,0) scale(1); }
            33% { transform: translate(70px,-50px) scale(1.12); }
            66% { transform: translate(-40px,60px) scale(0.92); }
            100% { transform: translate(50px,-30px) scale(1.06); }
        }

        .container { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 40px 24px; }

        /* ========== Language Toggle ========== */
        .lang-toggle {
            position: fixed; top: 20px; right: 20px;
            z-index: 100;
            display: flex; gap: 4px;
            background: rgba(22,22,44,0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(108,140,255,0.15);
            border-radius: 10px;
            padding: 4px;
        }
        .lang-toggle button {
            padding: 6px 14px;
            border: none; border-radius: 7px;
            background: transparent;
            color: var(--muted);
            font-size: 0.8em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s;
        }
        .lang-toggle button.active {
            background: rgba(108,140,255,0.2);
            color: var(--accent);
        }
        .lang-toggle button:hover:not(.active) {
            color: var(--text);
        }

        /* ========== Header ========== */
        header {
            text-align: center; padding: 50px 0 10px;
            opacity: 0; transform: translateY(20px);
            animation: fadeUp 0.8s ease forwards;
        }
        header .logo {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2), var(--pink));
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.8em; font-weight: 700; color: #fff;
            box-shadow: 0 0 40px rgba(108,140,255,0.3);
            animation: pulseGlow 3s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(108,140,255,0.3); }
            50% { box-shadow: 0 0 60px rgba(108,140,255,0.5), 0 0 80px rgba(167,139,250,0.2); }
        }
        header h1 {
            font-size: 2.6em; font-weight: 700; letter-spacing: 4px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--pink) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            display: inline-block;
        }
        header .sub { color: var(--muted); margin-top: 10px; font-size: 0.95em; letter-spacing: 1px; }
        header .sub em { color: var(--accent); font-style: normal; }

        /* ========== Tags ========== */
        .tags {
            display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
            margin: 24px 0;
        }
        .tags .tag {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 18px 8px 14px;
            border-radius: 100px;
            font-size: 0.82em;
            background: rgba(22,22,44,0.7);
            border: 1px solid rgba(108,140,255,0.12);
            color: var(--text);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
            cursor: default;
        }
        .tags .tag:hover {
            transform: translateY(-4px);
            border-color: rgba(108,140,255,0.3);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .tags .tag svg { width: 20px; height: 20px; flex-shrink: 0; }

        /* ========== Tool Proficiency ========== */
        .tools-section {
            display: flex; justify-content: center; gap: 30px; flex-wrap: wrap;
            margin: 30px 0 10px;
        }
        .tools-section .tool-item {
            text-align: center;
            transition: transform 0.3s;
        }
        .tools-section .tool-item:hover { transform: translateY(-5px); }
        .tools-section .tool-item .icon-wrap {
            width: 52px; height: 52px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 6px;
            transition: all 0.3s;
        }
        .tools-section .tool-item .icon-wrap svg { width: 28px; height: 28px; }
        .tools-section .tool-item .label { font-size: 0.72em; color: var(--muted); }

        /* ========== Hint Banner ========== */
        .hint-banner {
            text-align: center; padding: 12px;
            font-size: 0.82em; color: var(--muted);
            background: rgba(108,140,255,0.04);
            border: 1px dashed rgba(108,140,255,0.12);
            border-radius: 10px;
            letter-spacing: 1px;
            margin: 8px 0 12px;
        }

        /* ========== Section Title ========== */
        .section-title {
            display: flex; align-items: center; gap: 12px;
            font-size: 1.05em; font-weight: 600;
            margin: 48px 0 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(108,140,255,0.08);
        }
        .section-title .line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(108,140,255,0.25), transparent); }

        /* ========== Grid ========== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 22px;
        }

        /* ========== Card ========== */
        .card {
            background: var(--card);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            opacity: 0; transform: translateY(30px);
            transition: all 0.4s cubic-bezier(0.22,1,0.36,1);
        }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: rgba(108,140,255,0.2);
            box-shadow: 0 16px 50px rgba(0,0,0,0.5), 0 0 30px rgba(108,140,255,0.15);
        }

        .card .thumb {
            width: 100%; aspect-ratio: 16/9;
            position: relative; display: flex;
            align-items: center; justify-content: center;
            overflow: hidden;
            background: #15152a;
        }
        .card .thumb img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .card:hover .thumb img { transform: scale(1.06); }
        .card .thumb .thumb-fallback {
            position: absolute; inset: 0;
            display: none; align-items: center; justify-content: center;
            padding: 24px;
            background: linear-gradient(135deg, #1a1a3e, #2d1b4e, #1a1a3e);
            color: var(--muted);
            font-size: 0.9em; text-align: center;
            font-weight: 500; line-height: 1.5;
        }
        .card .thumb .play-btn {
            width: 56px; height: 56px;
            border-radius: 50%;
            background: rgba(108,140,255,0.95);
            border: 2px solid rgba(255,255,255,0.15);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 2;
            transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
            box-shadow: 0 0 20px rgba(108,140,255,0.3);
        }
        .card:hover .play-btn { transform: scale(1.12); box-shadow: 0 0 40px rgba(108,140,255,0.5); }
        .card .play-btn svg { width: 24px; height: 24px; fill: #fff; margin-left: 3px; }

        .card .info { padding: 16px 18px 20px; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.15)); }
        .card .info h3 { font-size: 0.95em; font-weight: 600; margin-bottom: 5px; color: var(--text); }
        .card .info p { font-size: 0.8em; color: var(--muted); line-height: 1.6; }
        .card .info .tools { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
        .card .info .tools span {
            font-size: 0.7em; padding: 3px 12px; border-radius: 12px;
            background: rgba(108,140,255,0.1); color: var(--accent);
            border: 1px solid rgba(108,140,255,0.1);
            display: inline-flex; align-items: center; gap: 4px;
        }
        .card .info .tools span svg { width: 12px; height: 12px; }
        .card .info .badge {
            font-size: 0.68em; margin-top: 8px;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .card .info .badge.yt { color: #ff6b6b; }
        .card .info .badge.yt svg { width: 14px; height: 14px; fill: #ff6b6b; }
        .card .info .badge.yt span { color: #ff6b6b; }
        .card .info .badge.local { color: #4caf50; }
        .card .info .badge.local span { color: #4caf50; }

        /* ========== Overlay ========== */
        .overlay {
            display: none; position: fixed; z-index: 999;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .overlay.active { display: flex; }
        .overlay-content { position: relative; width: 92%; max-width: 900px; animation: fadeIn 0.3s ease; }
        .overlay-content video { width: 100%; border-radius: 12px; outline: none; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        .overlay-controls {
            display: flex; align-items: center; gap: 16px;
            margin-top: 14px; justify-content: center;
        }
        .overlay-controls button {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 8px 20px; border-radius: 8px; cursor: pointer;
            font-size: 0.85em; transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .overlay-controls button:hover { background: rgba(255,255,255,0.15); }
        .overlay .close {
            position: absolute; top: -44px; right: 0;
            color: rgba(255,255,255,0.6); font-size: 30px; cursor: pointer;
            background: none; border: none; transition: color 0.2s; line-height: 1;
        }
        .overlay .close:hover { color: #fff; }

        /* ========== Contact ========== */
        .contact {
            text-align: center; padding: 40px 0 20px;
            border-top: 1px solid rgba(108,140,255,0.08);
            margin-top: 60px;
        }
        .contact p { color: var(--muted); font-size: 0.88em; margin-bottom: 4px; }
        .contact a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
        .contact a:hover { color: var(--accent2); }
        .contact .social-links { display: flex; justify-content: center; gap: 16px; margin-top: 16px; }
        .contact .social-links a {
            width: 44px; height: 44px; border-radius: 12px;
            background: rgba(108,140,255,0.06); border: 1px solid rgba(108,140,255,0.1);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .contact .social-links a:hover { background: rgba(108,140,255,0.15); transform: translateY(-3px); }
        .contact .social-links a svg { width: 20px; height: 20px; fill: var(--muted); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }

        @media (max-width: 640px) {
            header h1 { font-size: 1.8em; }
            .grid { grid-template-columns: 1fr; gap: 18px; }
            .container { padding: 20px 16px; }
            .tools-section { gap: 16px; }
        }
        @media (min-width: 641px) and (max-width: 900px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

                const badgeContent = v.type === "yt"
                    ? `<svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg><span>${lang.badgeYT}</span>`
                    : `<span style="color:#4caf50;">▶</span><span>${lang.badgeLocal}</span>`;

                const toolsHtml = v.tools.map(t => {
                    return (iconMap[t] || '') + t;
                }).join('');

                if (v.type === "yt") {
                    return `

                    return `

        // ===================== LANG SWITCH =====================
        function switchLang(lang) {
            currentLang = lang;
            const s = langStrings[lang];

            document.getElementById('langZh').className = lang === 'zh' ? 'active' : '';
            document.getElementById('langJa').className = lang === 'ja' ? 'active' : '';

            document.getElementById('title').textContent = s.title;
            document.getElementById('subtitle').textContent = s.subtitle;
            document.getElementById('labelAI').textContent = s.labelAI;
            document.getElementById('labelSNS').textContent = s.labelSNS;
            document.getElementById('sectionVideo').textContent = s.sectionVideo;
            document.getElementById('hintBanner').textContent = s.hint;
            document.getElementById('footerText').textContent = s.footer;
            document.getElementById('btnFullscreen').textContent = s.btnFullscreen;
            document.getElementById('btnClose').textContent = s.btnClose;

            // Re-render cards with new language
            render();
            // Re-run scroll animation
            initScrollAnimation();
        }

        // ===================== SCROLL ANIMATION =====================
        function initScrollAnimation() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
            }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
            document.querySelectorAll('.card').forEach((card, i) => {
                card.classList.remove('visible');
                card.style.transitionDelay = `${i * 0.06}s`;
                observer.observe(card);
            });
        }

        // ===================== VIDEO OVERLAY =====================
        function playLocal(file) {
            const player = document.getElementById('localPlayer');
            player.src = file;
            document.getElementById('videoOverlay').classList.add('active');
            player.play();
        }
        function closeOverlay() {
            const player = document.getElementById('localPlayer');
            player.pause(); player.src = '';
            document.getElementById('videoOverlay').classList.remove('active');
        }
        function toggleFullscreen() {
            const player = document.getElementById('localPlayer');
            if (document.fullscreenElement) document.exitFullscreen();
            else player.requestFullscreen?.() || player.webkitRequestFullscreen?.();
        }
        document.getElementById('videoOverlay').addEventListener('click', function(e) { if (e.target === this) closeOverlay(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

        // ===================== INIT =====================
        render();
        initScrollAnimation();
    </script>
